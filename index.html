<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบทดสอบ นายสิบทหารบก 2570</title>
    <style>
      :root {
        --primary: #2c3e50;
        --success: #2ecc71;
        --danger: #e74c3c;
        --bg: #f4f7f6;
      }
      body {
        font-family: "Tahoma", sans-serif;
        background: var(--bg);
        margin: 0;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: center; /* กึ่งกลางหน้าจอ */
        min-height: 100vh;
      }
      
      /* สไตล์หน้า Login */
      #login-screen {
        max-width: 400px;
        width: 100%;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .login-input {
        width: 90%;
        padding: 15px;
        margin: 20px 0;
        border: 2px solid #eee;
        border-radius: 12px;
        font-size: 1.2em;
        text-align: center;
        outline: none;
      }
      .login-btn {
        width: 100%;
        padding: 15px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.1em;
        cursor: pointer;
        font-weight: bold;
      }

      /* สไตล์กล่องข้อสอบ */
      .quiz-container {
        max-width: 600px;
        width: 100%;
        background: white;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        display: none; /* ซ่อนไว้ก่อน Login */
      }
      .subject-tag {
        font-size: 0.8em;
        color: white;
        background: var(--primary);
        padding: 5px 15px;
        border-radius: 15px;
        margin-bottom: 10px;
        display: inline-block;
      }
      .passage-box {
        background: #fffde7;
        border-left: 5px solid #f1c40f;
        padding: 15px;
        margin-bottom: 15px;
        font-style: italic;
        font-size: 0.95em;
        line-height: 1.6;
        display: none;
        white-space: pre-wrap;
        border-radius: 5px;
      }
      .question {
        font-weight: bold;
        margin-bottom: 20px;
        font-size: 1.1em;
        color: #333;
      }
      .option {
        display: block;
        background: #f8f9fa;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 12px;
        cursor: pointer;
        border: 2px solid #eee;
        width: 100%;
        text-align: left;
        font-size: 1em;
        transition: 0.2s;
        outline: none;
      }
      .option:hover {
        background: #e9ecef;
      }
      .correct {
        background: var(--success) !important;
        color: white;
        border-color: #27ae60;
      }
      .wrong {
        background: var(--danger) !important;
        color: white;
        border-color: #c0392b;
      }
      #next-btn {
        margin-top: 10px;
        padding: 15px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        display: none;
        width: 100%;
        font-size: 1.1em;
        font-weight: bold;
      }
      .progress-info {
        font-size: 0.85em;
        color: #888;
        text-align: center;
        margin-top: 15px;
      }
      .score-board {
        text-align: center;
        display: none;
        padding: 40px 10px;
      }
    </style>
  </head>
  <body>

    <!-- ส่วนที่ 1: หน้า Login -->
    <div id="login-screen">
      <h2 style="color: var(--primary); margin: 0;">กรุณาใส่รหัสผ่าน</h2>
      <p style="color: #888; font-size: 0.9em;">เพื่อเข้าทำแบบทดสอบนายสิบทหารบก</p>
      <input type="password" id="passcode" class="login-input" placeholder="ใส่รหัสผ่านที่นี่">
      <button onclick="checkLogin()" class="login-btn">เข้าสู่ระบบ</button>
      <p id="error-msg" style="color: var(--danger); margin-top: 15px; display: none;">❌ รหัสผ่านไม่ถูกต้อง</p>
    </div>

    <!-- ส่วนที่ 2: หน้าข้อสอบ (จะแสดงเมื่อรหัสผ่านถูกต้อง) -->
    <div class="quiz-container" id="quiz-container">
      <div id="quiz-content">
        <div class="subject-tag" id="subject-tag">กำลังโหลด...</div>
        <div class="passage-box" id="passage-box"></div>
        <div class="question" id="question-text">กรุณารอสักครู่...</div>
        <div id="options-container"></div>
        <button id="next-btn" onclick="nextQuestion()">ข้อถัดไป ➔</button>
        <div class="progress-info" id="progress-info"></div>
      </div>

      <div class="score-board" id="score-board">
        <h2>จบการทดสอบ!</h2>
        <div style="font-size: 4em; color: var(--success); font-weight: bold" id="final-score">0</div>
        <p id="result-summary"></p>
        <button class="option" style="text-align: center; background: var(--primary); color: white" onclick="location.reload()">
          เริ่มทำใหม่
        </button>
      </div>
    </div>

    <script>
      const SECRET_CODE = "army2570"; // <--- รหัสผ่านคืออันนี้ครับ
      let quizList = [];
      let currentIdx = 0;
      let score = 0;

      // ฟังก์ชันเช็ครหัสผ่าน
      function checkLogin() {
        const input = document.getElementById("passcode").value;
        if (input === SECRET_CODE) {
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("quiz-container").style.display = "block";
          loadExamData(); // เริ่มโหลดข้อมูลเมื่อเข้าสู่ระบบสำเร็จ
        } else {
          document.getElementById("error-msg").style.display = "block";
          document.getElementById("passcode").value = "";
        }
      }

      async function loadExamData() {
        try {
          const response = await fetch("exam.json");
          const data = await response.json();

          data.forEach((sec) => {
            sec.questions.forEach((item) => {
              item.category = sec.category;
              quizList.push(item);
            });
          });
          loadQuestion();
        } catch (e) {
          document.getElementById("question-text").innerText =
            "❌ ไม่สามารถโหลดไฟล์ exam.json ได้ (ต้องรันผ่าน Live Server เท่านั้น)";
        }
      }

      function loadQuestion() {
        const item = quizList[currentIdx];
        document.getElementById("subject-tag").innerText = item.category;
        document.getElementById("question-text").innerText =
          (currentIdx + 1) + ". " + item.question;
        document.getElementById("progress-info").innerText =
          `ข้อที่ ${currentIdx + 1} / ${quizList.length}`;

        const pBox = document.getElementById("passage-box");
        if (item.p) {
          pBox.innerText = item.p;
          pBox.style.display = "block";
        } else {
          pBox.style.display = "none";
        }

        const container = document.getElementById("options-container");
        container.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        Object.keys(item.options).forEach((key) => {
          const btn = document.createElement("button");
          btn.className = "option";
          btn.innerText = key + ". " + item.options[key];
          btn.onclick = () => checkAnswer(btn, key, item.answer);
          container.appendChild(btn);
        });
      }

      function checkAnswer(btn, selected, correct) {
        const all = document.querySelectorAll(".option");
        all.forEach((b) => (b.style.pointerEvents = "none"));

        if (selected === correct) {
          btn.classList.add("correct");
          score++;
        } else {
          btn.classList.add("wrong");
          all.forEach((b) => {
            if (b.innerText.startsWith(correct + "."))
              b.classList.add("correct");
          });
        }
        document.getElementById("next-btn").style.display = "block";
      }

      function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizList.length) loadQuestion();
        else showScore();
      }

      function showScore() {
        document.getElementById("quiz-content").style.display = "none";
        document.getElementById("score-board").style.display = "block";
        document.getElementById("final-score").innerText = score;
        document.getElementById("result-summary").innerText =
          `คุณทำได้ ${score} จาก ${quizList.length} ข้อ`;
      }
    </script>
  </body>
</html>
